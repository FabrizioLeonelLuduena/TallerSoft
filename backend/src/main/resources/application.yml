server:
  port: ${BACKEND_PORT:8081}
  servlet:
    context-path: /

spring:
  application:
    name: tallersoft-backend
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tallersoft}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
  
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: false
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

logging:
  level:
    root: INFO
    com.tallersoft: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

taller:
  nombre: ${TALLER_NOMBRE:TallerSoft Demo}
  direccion: ${TALLER_DIRECCION:Av. Colón 1234, Córdoba}
  telefono: ${TALLER_TELEFONO:0351-4123456}
  email: ${TALLER_EMAIL:contacto@tallersoft.com}

mercadopago:
  access-token: ${MP_ACCESS_TOKEN:TEST-placeholder}
  webhook-secret: ${MP_WEBHOOK_SECRET:placeholder}
  sandbox: ${MP_SANDBOX:true}
  user-id: ${MP_USER_ID:0}
  pos-external-id: ${MP_POS_EXTERNAL_ID:tallersoftcaja01}
  qr-image-url: ${MP_QR_IMAGE_URL:}

# ─────────────────────────────────────────────────────────────
# WEBHOOK LOCAL CON NGROK (sandbox)
#
# 1. Instalar ngrok: https://ngrok.com/download
# 2. Arrancar: ngrok http 8080
# 3. Copiar la URL HTTPS generada (ej: https://abc123.ngrok-free.app)
# 4. Setear en .env: WEBHOOK_BASE_URL=https://abc123.ngrok-free.app
# 5. Reiniciar: docker compose down && docker compose up -d
# 6. Registrar en el panel de MercadoPago (Developers → Tu app → Webhooks):
#    URL: https://abc123.ngrok-free.app/api/pagos/webhook
#    Eventos: payment
#
# TESTING EN SANDBOX
# - Tarjeta Mastercard aprobada: 5031 7557 3453 0604 | CVV: 123 | Venc: 11/25
# - Tarjeta Visa aprobada:       4509 9535 6623 3704 | CVV: 123 | Venc: 11/25
# - Tarjeta rechazada:           4000 0000 0000 0002
# - Flujo: abrir sandboxInitPoint → pagar con tarjeta de prueba →
#          verificar que el webhook llega y cobros.estado_pago cambia a APROBADO →
#          verificar que la orden pasa a ENTREGADO
# ─────────────────────────────────────────────────────────────
webhook:
  base-url: ${WEBHOOK_BASE_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

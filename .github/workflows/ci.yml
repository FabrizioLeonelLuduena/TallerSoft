name: CI — Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:

  test-backend:
    name: Backend — JUnit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tallersoft_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tallersoft_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test_secret_key_minimo_256_bits_para_ci_pipeline_tallersoft
          MP_ACCESS_TOKEN: TEST-dummy-token
          MP_WEBHOOK_SECRET: dummy-webhook-secret
          MP_SANDBOX: true
          WEBHOOK_BASE_URL: http://localhost:8080
          ANTHROPIC_API_KEY: dummy-key
          CLAUDE_MODEL: claude-haiku-4-5-20251001
          CLAUDE_MAX_TOKENS: 1024
        run: mvn test --batch-mode

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  test-analytics:
    name: Analytics — pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: analytics/requirements.txt

      - name: Install dependencies
        working-directory: ./analytics
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./analytics
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tallersoft_test
          ANALYTICS_USER: postgres
          ANALYTICS_PASSWORD: postgres
          GROQ_API_KEY: dummy-key-for-tests
          ALLOWED_ORIGINS: http://localhost:8080
          GROQ_MODEL: llama-3.3-70b-versatile
          GROQ_MAX_TOKENS: 512
        run: python -m pytest tests/ -v --tb=short

  test-frontend:
    name: Frontend — Karma
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  all-tests-passed:
    name: Todos los tests pasaron
    runs-on: ubuntu-latest
    needs: [test-backend, test-analytics, test-frontend]
    if: always()
    steps:
      - name: Verificar resultado
        run: |
          if [ "${{ needs.test-backend.result }}" != "success" ] || \
             [ "${{ needs.test-analytics.result }}" != "success" ] || \
             [ "${{ needs.test-frontend.result }}" != "success" ]; then
            echo "Uno o más jobs fallaron"
            exit 1
          fi
          echo "Todos los tests pasaron ✓"

name: CD — Build y Push Docker

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:

  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tallersoft" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y push Analytics
        uses: docker/build-push-action@v5
        with:
          context: ./analytics
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-analytics:latest
            ${{ env.IMAGE_PREFIX }}-analytics:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-gateway:latest
            ${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumen
        run: |
          echo "## Imágenes publicadas" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.IMAGE_PREFIX }}-analytics:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

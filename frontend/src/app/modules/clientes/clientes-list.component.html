<div class="clientes-list-container">
  <!-- Header bar with search and action -->
  <div class="list-header">
    <div class="search-bar">
      <mat-icon class="search-icon">search</mat-icon>
      <input 
        type="text"
        class="search-input"
        placeholder="Buscar cliente por nombre..."
        [(ngModel)]="searchTerm"
        (input)="filterClientes()"
      />
    </div>
    <button 
      mat-raised-button 
      color="primary" 
      class="btn-new"
      *ngIf="canCreateCliente()"
      (click)="crearCliente()"
    >
      <mat-icon>add</mat-icon>
      Nuevo Cliente
    </button>
  </div>

  <!-- Skeleton loader -->
  <div class="clients-grid" *ngIf="loading">
    <div class="skeleton-card" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="skeleton-avatar"></div>
      <div class="skeleton-name"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-footer"></div>
    </div>
  </div>

  <!-- Clients grid -->
  <div class="clients-grid" *ngIf="!loading && filteredClientes.length > 0">
    <div 
      class="client-card" 
      *ngFor="let cliente of filteredClientes"
      (click)="verDetalles(cliente)"
    >
      <div class="card-avatar">
        {{ getInitials(cliente.nombre) }}
      </div>
      <div class="card-content">
        <h3 class="client-name">{{ cliente.nombre }}</h3>
        <div class="client-contact" *ngIf="cliente.email">
          <mat-icon class="contact-icon">email</mat-icon>
          <span class="contact-text">{{ cliente.email }}</span>
        </div>
        <div class="client-contact" *ngIf="cliente.telefono">
          <mat-icon class="contact-icon">phone</mat-icon>
          <span class="contact-text">{{ cliente.telefono }}</span>
        </div>
      </div>
      <div class="card-footer">
        <span class="ordenes-badge" *ngIf="getClienteOrdenesCount(cliente.id) > 0">
          {{ getClienteOrdenesCount(cliente.id) }} órdenes
        </span>
        <button 
          mat-icon-button 
          class="btn-navigate"
          (click)="verDetalles(cliente); $event.stopPropagation()"
        >
          <mat-icon>arrow_forward</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="!loading && filteredClientes.length === 0">
    <mat-icon class="empty-icon">people_outline</mat-icon>
    <h3 class="empty-title">No se encontraron clientes</h3>
    <p class="empty-text" *ngIf="searchTerm">
      Intentá con otro nombre
    </p>
    <p class="empty-text" *ngIf="!searchTerm">
      Comienza agregando tu primer cliente
    </p>
    <button 
      mat-raised-button 
      color="primary"
      (click)="crearCliente()"
      *ngIf="!searchTerm && canCreateCliente()"
    >
      <mat-icon>add</mat-icon>
      Agregar primer cliente
    </button>
  </div>
</div>

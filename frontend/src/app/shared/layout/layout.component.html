<div class="layout-container">
  <!-- Sidebar Navigation -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <!-- Logo Section -->
    <div class="sidebar-header">
      <div class="logo-container">
        <div class="logo-icon-wrapper">
          <span class="material-symbols-outlined logo-icon">build</span>
        </div>
        <div class="logo-text">
          <span class="logo-name">TallerSoft</span>
          <span class="logo-version">v1.0</span>
        </div>
      </div>
    </div>

    <!-- Navigation Items -->
    <nav class="sidebar-nav">
      <a *ngFor="let item of getVisibleNavItems()"
         [routerLink]="item.route"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: false }"
         class="nav-item"
         [title]="sidebarCollapsed ? item.label : ''">
        <span class="material-symbols-outlined nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <!-- Sidebar Footer with User Profile Dropdown -->
    <div class="sidebar-footer">
      <div class="user-profile" #profileDropdown>
        <button class="avatar-btn" (click)="toggleProfileDropdown()">
          <div class="avatar">{{ getUserInitials() }}</div>
          <div class="user-info">
            <p class="user-name">{{ getUserName() }}</p>
            <p class="user-role">{{ getRolLabel() }}</p>
          </div>
          <span class="material-symbols-outlined dropdown-arrow">expand_more</span>
        </button>

        <!-- Profile Dropdown Menu -->
        <div class="profile-dropdown" *ngIf="profileDropdownOpen">
          <button class="dropdown-item" (click)="goToProfile()">
            <span class="material-symbols-outlined">person</span>
            <span>Mi Perfil</span>
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item logout-item" (click)="logout()">
            <span class="material-symbols-outlined">logout</span>
            <span>Cerrar Sesión</span>
          </button>
        </div>
      </div>

      <!-- Notifications Badge -->
      <div class="sidebar-notifications" title="Notificaciones">
        <span class="material-symbols-outlined">notifications</span>
        <span class="notification-badge" *ngIf="hasNotifications">1</span>
      </div>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="main-area">
    <!-- Content Area -->
    <main class="content-area page-enter">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

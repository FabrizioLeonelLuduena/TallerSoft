services:
  # ─── BASE DE DATOS ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tallersoft-db-dev
    environment:
      POSTGRES_DB: ${DB_NAME:-tallersoft}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      - ./scripts/create-analytics-user.sql:/docker-entrypoint-initdb.d/02-create-analytics-user.sql
      - ./scripts/init-admin-user.sql:/docker-entrypoint-initdb.d/03-init-admin-user.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── BACKEND (Spring Boot) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tallersoft-backend-dev
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-tallersoft}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-clave_secreta_minimo_256_bits_desarrollo}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      BACKEND_PORT: 8081
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-test}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-test}
      MP_SANDBOX: ${MP_SANDBOX:-false}
      MP_USER_ID: ${MP_USER_ID:-0}
      MP_POS_EXTERNAL_ID: ${MP_POS_EXTERNAL_ID:-tallersoftcaja01}
      MP_QR_IMAGE_URL: ${MP_QR_IMAGE_URL:-}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-http://localhost:8080}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-dummy}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-1000}
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/v3/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ─── ANALYTICS (Python + FastAPI) ────────────────────────────────────────────
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: tallersoft-analytics-dev
    env_file:
      - ./analytics/.env
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

  # ─── GATEWAY (Spring Cloud Gateway) ──────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: tallersoft-gateway-dev
    environment:
      GATEWAY_PORT: 8080
      BACKEND_PORT: 8081
      ANALYTICS_PORT: 8082
      JWT_SECRET: ${JWT_SECRET:-clave_secreta_minimo_256_bits_desarrollo}
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
      analytics:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v3/api-docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # ─── FRONTEND (Angular + nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tallersoft-frontend-dev
    ports:
      - "4200:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  postgres_data_dev:

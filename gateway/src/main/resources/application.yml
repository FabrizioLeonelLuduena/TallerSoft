server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: tallersoft-gateway
  
  cloud:
    gateway:
      routes:
        # API Routes to Core Service — backend ya maneja /api/** paths
        - id: core-api
          uri: http://backend:${BACKEND_PORT:8081}
          predicates:
            - Path=/api/**

        # Auth Routes to Core Service
        - id: auth
          uri: http://backend:${BACKEND_PORT:8081}
          predicates:
            - Path=/auth/**

        # Analytics Routes to Analytics Service
        - id: analytics
          uri: http://analytics:${ANALYTICS_PORT:8082}
          predicates:
            - Path=/analytics/**
          filters:
            - RewritePath=/analytics/(?<segment>.*), /analytics/$\{segment}

        # Swagger UI Routes to Core Service
        - id: swagger-ui
          uri: http://backend:${BACKEND_PORT:8081}
          predicates:
            - Path=/swagger-ui/**,/v3/api-docs/**

      # Default filter chain
      default-filters:
        - AddResponseHeader=X-Frame-Options,DENY
        - AddResponseHeader=X-Content-Type-Options,nosniff
        - AddResponseHeader=X-XSS-Protection,"1; mode=block"

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,routes
  endpoint:
    health:
      show-details: when-authorized
